<!-- استبدل قسم الـ Form القديم في كود index.html بهذا الكود المحدث -->
<div class="form-container">
    <!-- أضفنا رابط إعادة التوجيه التلقائي بعد الدفع عبر Formspree _next -->
    <form action="https://formspree.io/f/maqgeqgg" method="POST">
        
        <!-- هذا السطر يخبر Formspree بنقل المستخدم تلقائياً لصفحة الدفع بقيمة 10$ بعد الضغط على إرسال -->
        <!-- ملاحظة: استبدل الرابط أدناه برابط الدفع المباشر الـ Whish الخاص بك عند تجهيزه -->
        <input type="hidden" name="_next" value="https://whishmoney.com/pay/robotics-academy-beirut-10usd">
        
        <!-- قيمة الدفع المخفية لتوثيقها في الإيميل المالي الواصل إليك -->
        <input type="hidden" name="amount_to_pay" value="10 USD">

        <div class="form-group">
            <label for="parentName">Parent / Guardian Name</label>
            <input type="text" id="parentName" name="parent_name" required placeholder="John Doe">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="name@example.com">
        </div>
        <div class="form-group">
            <label for="phone">Phone Number (WhatsApp)</label>
            <input type="tel" id="phone" name="phone" required placeholder="+961 XX XXX XXX">
        </div>
        <div class="form-group">
            <label for="studentAge">Student Age / Preferred Track</label>
            <select id="studentAge" name="student_track" required>
                <option value="" disabled selected>Select age group</option>
                <option value="junior">Junior Explorer (Ages 8-10)</option>
                <option value="rising">Rising Engineer (Ages 11-12)</option>
                <option value="advanced">Advanced Developer (Ages 13-15)</option>
            </select>
        </div>
        
        <!-- زر الإرسال المحدث مع التنبيه بالدفع -->
        <button type="submit" class="submit-btn" style="background: linear-gradient(90deg, #FF512F, #DD2476); color: white;">
            Proceed to Secure Payment (10 USD)
        </button>
    </form>
</div>
