    <style>
        :root {
            --bg-dark: #060913;
            --card-dark: #111726;
            --cyber-cyan: #00F2FE;
            --cyber-blue: #4FACFE;
            --signal-orange: #FF512F;
            --shield-gold: #F0A500;
            --english-purple: #A855F7;
            --muay-thai-red: #E63946;
            --text-light: #FFFFFF;
            --text-muted: #8A99AD;
            --whatsapp-green: #25D366;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(6, 9, 19, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo-container svg {
            height: 55px;
            width: auto;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--cyber-cyan);
        }

        /* Hero Section */
        .hero {
            margin-top: 100px;
            padding: 80px 8% 120px 8%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at 50% 30%, rgba(0, 242, 254, 0.08) 0%, transparent 60%);
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .hero h1 span {
            background: linear-gradient(90deg, var(--cyber-cyan), var(--cyber-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 700px;
            margin-bottom: 40px;
        }

        .cta-button {
            display: inline-block;
            padding: 14px 35px;
            background: linear-gradient(90deg, var(--cyber-cyan), var(--cyber-blue));
            color: var(--bg-dark);
            text-decoration: none;
            font-weight: 700;
            border-radius: 8px;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.6);
        }

        /* Curriculum Section */
        .curriculum-section {
            padding: 80px 8%;
            background-color: rgba(17, 23, 38, 0.4);
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 60px;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 4px;
            background: var(--signal-orange);
            margin: 15px auto 0 auto;
            border-radius: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background-color: var(--card-dark);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 35px 25px;
            transition: transform 0.3s, border-color 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--cyber-cyan);
        }

        .card.phase-2::before { background: var(--signal-orange); }
        .card.phase-3::before { background: var(--shield-gold); }
        .card.english-track::before { background: var(--english-purple); }
        .card.muay-thai-track::before { background: var(--muay-thai-red); }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 242, 254, 0.3);
        }

        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .card .age {
            display: inline-block;
            font-size: 0.85rem;
            padding: 3px 12px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            margin-bottom: 20px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .card ul {
            list-style-position: inside;
            color: var(--text-muted);
        }

        .card ul li {
            margin-bottom: 8px;
        }

        /* Registration Form Section */
        .registration-section {
            padding: 80px 8%;
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .form-container {
            background-color: var(--card-dark);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
        }

            margin-bottom: 20px;
        }
