    <style>
        :root {
            --bg-dark: #060913;
            --card-dark: #111726;
            --cyber-cyan: #00F2FE;
            --cyber-blue: #4FACFE;
            --signal-orange: #FF512F;
            --shield-gold: #F0A500;
            --english-purple: #A855F7;
            --muay-thai-red: #E63946;
            --text-light: #FFFFFF;
            --text-muted: #8A99AD;
            --whatsapp-green: #25D366;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
            line-height: 1.6;
            padding-top: 80px;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 8%;
            background: #060913;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo-container svg {
            height: 50px;
            width: auto;
            display: block;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--cyber-cyan);
        }

        /* Hero Section */
        .hero {
            padding: 60px 8% 80px 8%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at 50% 30%, rgba(0, 242, 254, 0.06) 0%, transparent 60%);
        }

        .hero h1 {
            font-size: 3.2rem;
            font-weight: 900;
            margin-bottom: 20px;
            letter-spacing: 1px;
            color: #ffffff;
            line-height: 1.2;
        }

        .hero h1 span {
            background: linear-gradient(90deg, var(--cyber-cyan), var(--cyber-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.15rem;
            color: var(--text-muted);
            max-width: 700px;
            margin-bottom: 35px;
        }

        .cta-button {
            display: inline-block;
            padding: 14px 35px;
            background: linear-gradient(90deg, var(--cyber-cyan), var(--cyber-blue));
            color: var(--bg-dark);
            text-decoration: none;
            font-weight: 700;
            border-radius: 8px;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.5);
        }

        /* Curriculum Section Layout */
        .curriculum-section {
            padding: 60px 8%;
            background-color: rgba(17, 23, 38, 0.3);
        }

        .section-title {
            text-align: center;
            font-size: 2.3rem;
            margin-bottom: 50px;
            position: relative;
            color: #ffffff;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 70px;
            height: 4px;
            background: var(--signal-orange);
            margin: 12px auto 0 auto;
            border-radius: 2px;
        }

        /* الصف الأول: 3 أعمدة ثابتة ومحددة للروبوتكس */
        .grid-main {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 30px;
        }

        /* الصف الثاني: كرتين ممركزين في المنتصف للانجليزي والرياضة */
        .grid-secondary {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 840px;
            margin: 0 auto;
        }

        .card {
            background-color: var(--card-dark);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding-bottom: 30px;
            transition: transform 0.3s, border-color 0.3s;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--cyber-cyan);
            z-index: 10;
        }

        .card.phase-2::before { background: var(--signal-orange); }
        .card.phase-3::before { background: var(--shield-gold); }
        .card.english-track::before { background: var(--english-purple); }
        .card.muay-thai-track::before { background: var(--muay-thai-red); }

        /* حاوية الصورة لملء الفراغات ومنع الخط الأسود تماماً */
        .card-image-wrapper {
            width: 100%;
            aspect-ratio: 1.35 / 1; 
            overflow: hidden;
            position: relative;
            background-color: var(--card-dark);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            object-position: center top;
            transition: transform 0.4s ease;
        }

        .card:hover .card-image-wrapper img {
            transform: scale(1.03);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 242, 254, 0.25);
        }

        .card-content {
            padding: 25px 25px 0 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card h3 {
            font-size: 1.35rem;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .card .age {
            align-self: flex-start;
            font-size: 0.8rem;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            margin-bottom: 15px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card ul {
            list-style-position: inside;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .card ul li {
            margin-bottom: 8px;
        }

        /* Registration Form Section */
        .registration-section {
            padding: 60px 8%;
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .form-container {
            background-color: var(--card-dark);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 35px;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background-color: rgba(6, 9, 19, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: var(--text-light);
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--cyber-cyan);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, var(--cyber-cyan), var(--cyber-blue));
            border: none;
            border-radius: 6px;
            color: var(--bg-dark);
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
