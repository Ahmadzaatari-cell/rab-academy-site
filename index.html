        :root {
            --bg-dark: #060913;
            --card-dark: #111726;
            --cyber-cyan: #00F2FE;
            --cyber-blue: #4FACFE;
            --signal-orange: #FF512F;
            --shield-gold: #F0A500;
            --english-purple: #A855F7;
            --muay-thai-red: #E63946;
            --text-light: #FFFFFF;
            --text-muted: #8A99AD;
            --whatsapp-green: #25D366;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
            line-height: 1.6;
            padding-top: 100px;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: #060913;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo-container svg {
            height: 55px;
            width: auto;
            display: block;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--cyber-cyan);
        }

        .hero {
            padding: 80px 8% 120px 8%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;

        }

            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 20px;
            letter-spacing: 2px;
            color: #ffffff;
        }

        .hero h1 span {
            background: linear-gradient(90deg, var(--cyber-cyan), var(--cyber-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 700px;
            margin-bottom: 40px;
        }
